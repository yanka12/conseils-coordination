name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; les pushes rapprochés annulent le précédent.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Installer les dépendances PHP
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Installer les dépendances JS
        run: npm ci

      # Laravel refuse de démarrer sans APP_KEY, même pour rendre une page statique.
      # Par défaut la session et le cache passent par la base de données : sans
      # base migrée, le rendu échoue sur une QueryException. Le site n'ayant
      # besoin d'aucune persistance, on les bascule sur des pilotes sans état.
      - name: Préparer l'environnement Laravel
        run: |
          cp .env.example .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          php artisan key:generate

      - name: Générer le site statique
        run: bash scripts/export-static.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
